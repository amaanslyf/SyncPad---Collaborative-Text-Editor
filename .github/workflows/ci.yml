name: SyncPad CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # ─── Server ─────────────────────────────────────────
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Lint server
        working-directory: ./server
        run: npm run lint

      - name: Test server
        working-directory: ./server
        run: npm run test:run
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key_for_vitest

      # ─── Client ─────────────────────────────────────────
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint client
        working-directory: ./client
        run: npm run lint

      - name: Test client
        working-directory: ./client
        run: npm run test:run

      - name: Build client
        working-directory: ./client
        run: npm run build
